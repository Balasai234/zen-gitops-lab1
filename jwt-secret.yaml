apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jwt-secret
  namespace: dev

spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: jwt-secret

  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: /pharma/dev/jwt-secret-key
